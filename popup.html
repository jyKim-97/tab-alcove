<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Alcove</title>
  <link rel="stylesheet" href="styles/common.css">
  <style>
    body {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-title {
      flex: 1;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .shelf-all-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-weight: 500;
      background: var(--surface-hover);
      color: var(--text-secondary);
      white-space: nowrap;
      transition: background 0.12s, color 0.12s;
    }
    .shelf-all-btn:hover { background: var(--accent); color: #fff; }
    .shelf-all-btn:disabled { opacity: 0.45; cursor: default; }

    .icon-btn {
      position: relative;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      transition: background 0.1s, color 0.1s;
    }
    .icon-btn:hover { background: var(--surface-hover); color: var(--text-primary); }
    .icon-btn[data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      top: calc(100% + 5px);
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px 8px;
      font-size: 11px;
      white-space: nowrap;
      color: var(--text-primary);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s;
      z-index: 200;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .icon-btn[data-tooltip]:hover::after { opacity: 1; }

    /* ── Search ── */
    .search-bar {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .search-bar .input {
      flex: 1;
      font-size: 12px;
      padding: 6px 10px;
    }

    .move-cat-dropdown {
      position: absolute;
      top: calc(100% + 2px);
      right: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 4px 16px rgba(0,0,0,0.45);
      min-width: 148px;
      z-index: 100;
      overflow: hidden;
    }
    .move-cat-item {
      padding: 7px 12px;
      font-size: 12px;
      cursor: pointer;
      color: var(--text-primary);
      transition: background 0.1s;
    }
    .move-cat-item:hover { background: var(--surface-hover); }
    .move-cat-empty {
      padding: 7px 12px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* ── List ── */
    .shelf-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .shelf-list::-webkit-scrollbar { width: 4px; }
    .shelf-list::-webkit-scrollbar-track { background: transparent; }
    .shelf-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      gap: 10px;
      color: var(--text-secondary);
    }
    .empty-state svg { opacity: 0.25; }
    .empty-state p { font-size: 13px; }

    /* ── Domain group ── */
    .domain-group { border-bottom: 1px solid var(--border); }

    .domain-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--surface);
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
      position: relative;
    }
    .domain-header:hover { background: var(--surface-hover); }

    .domain-group.expanded .domain-header {
      background: color-mix(in srgb, var(--surface) 75%, var(--accent) 25%);
    }
    .domain-group.expanded .domain-header::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
    }

    .domain-chevron {
      color: var(--text-secondary);
      transition: transform 0.15s;
      flex-shrink: 0;
      opacity: 0.6;
    }
    .domain-group.expanded .domain-chevron {
      transform: rotate(90deg);
      color: var(--accent);
      opacity: 1;
    }

    .domain-favicon {
      width: 14px; height: 14px;
      flex-shrink: 0; object-fit: contain;
    }
    .domain-favicon-fallback {
      width: 14px; height: 14px;
      background: var(--surface-hover);
      border-radius: 3px; flex-shrink: 0;
    }

    .domain-name {
      flex: 1;
      font-size: 12px;
      font-weight: 600;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .domain-badge {
      font-size: 11px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--text-secondary);
      background: var(--bg);
      padding: 1px 7px;
      border-radius: 99px;
      flex-shrink: 0;
      min-width: 22px;
      text-align: center;
    }

    .domain-restore-btn {
      display: none;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #fff;
      flex-shrink: 0;
      transition: background 0.1s;
    }
    .domain-dismiss-btn {
      display: none;
      width: 20px;
      height: 20px;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      flex-shrink: 0;
      transition: background 0.1s, color 0.1s;
    }
    .domain-header:hover .domain-restore-btn { display: flex; }
    .domain-header:hover .domain-dismiss-btn { display: flex; }
    .domain-header:hover .domain-badge { display: none; }
    .domain-restore-btn:hover { background: var(--accent-hover); }
    .domain-dismiss-btn:hover { background: var(--danger); color: #fff; }

    /* ── Tab items ── */
    .tab-items { display: none; }
    .domain-group.expanded .tab-items { display: block; }

    .tab-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px 6px 36px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .tab-item:hover { background: var(--surface); }
    .tab-item:hover .tab-remove { opacity: 1; }

    .tab-favicon {
      width: 13px; height: 13px;
      flex-shrink: 0; object-fit: contain;
    }
    .tab-favicon-fallback {
      width: 13px; height: 13px;
      background: var(--surface-hover);
      border-radius: 2px; flex-shrink: 0;
    }

    .tab-info { flex: 1; min-width: 0; }

    .tab-title {
      font-size: 12px;
      line-height: 1.35;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: var(--text-primary);
    }

    .tab-time {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 1px;
      font-variant-numeric: tabular-nums;
    }

    .tab-remove {
      opacity: 0;
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      flex-shrink: 0;
      transition: opacity 0.1s, background 0.1s, color 0.1s;
    }
    .tab-remove:hover { background: var(--danger); color: #fff; }

    .show-more {
      padding: 4px 14px 7px 36px;
      font-size: 11px;
      color: var(--text-secondary);
      cursor: pointer;
    }
    .show-more:hover { color: var(--accent); }

    /* ── Stats strip ── */
    .stats-strip {
      display: flex;
      align-items: stretch;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .stat-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 12px;
      gap: 2px;
    }

    .stat-item + .stat-item {
      border-left: 1px solid var(--border);
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text-primary);
      line-height: 1;
    }

    .stat-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
    }

    /* ── Category icon ── */
    .category-icon {
      display: flex; align-items: center; justify-content: center;
      color: var(--accent); opacity: 0.8;
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <button class="icon-btn" id="saveTabBtn" data-tooltip="Shelf current tab">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
    </button>
    <button class="shelf-all-btn" id="shelfAllBtn" title="Shelf all open tabs in this window">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Shelf All Tabs
    </button>
    <button class="icon-btn" id="settingsBtn" data-tooltip="Settings">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l-.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <div class="search-bar">
    <input type="text" class="input" id="searchInput" placeholder="Search tabs...">
    <div id="selectionActions" style="display:none;align-items:center;gap:1px;flex-shrink:0">
      <button class="icon-btn" id="collapseAllBtn" data-tooltip="Collapse expanded groups">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="7 11 12 6 17 11"/>
          <polyline points="7 18 12 13 17 18"/>
        </svg>
      </button>
      <button class="icon-btn" id="moveToCatBtn" data-tooltip="Move to category">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          <polyline points="12 12 12 17"/>
          <polyline points="9 15 12 18 15 15"/>
        </svg>
      </button>
      <button class="icon-btn" id="closeSelectedBtn" data-tooltip="Add auto-close rule for selected domains">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
        </svg>
      </button>
      <button class="icon-btn" id="dismissSelectedBtn" data-tooltip="Remove selected from shelf">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
      </button>
    </div>
    <div id="moveToCatDropdown" class="move-cat-dropdown" style="display:none"></div>
  </div>

  <div class="shelf-list" id="shelfList"></div>

  <div class="stats-strip">
    <div class="stat-item">
      <span class="stat-value" id="statTabCount">0</span>
      <span class="stat-label">Tabs Stored</span>
    </div>
    <div class="stat-item">
      <span class="stat-value" id="statDomainCount">0</span>
      <span class="stat-label">Domains</span>
    </div>
  </div>

  <div class="footer">
    <button class="btn btn-ghost" id="restoreAllBtn">Restore All</button>
    <button class="btn btn-danger" id="clearAllBtn">Clear All</button>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
